<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - House of Beers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .language-picker {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .lang-btn {
            background-color: transparent;
            border: 1px solid rgba(190, 164, 136, 0.3);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            color: #888888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn:hover {
            border-color: #d5c8ad;
            color: #d5c8ad;
        }
        .lang-btn.active {
            background-color: #d5c8ad;
            border-color: #d5c8ad;
            color: #000000;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #d5c8ad;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 18px;
            color: #888888;
        }
        .form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input {
            background-color: #1a1a1a;
            border: 1px solid rgba(190, 164, 136, 0.3);
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            color: #ffffff;
            width: 100%;
        }
        .input:focus {
            outline: none;
            border-color: #d5c8ad;
        }
        .input::placeholder {
            color: #666666;
        }
        .button {
            background-color: #d5c8ad;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            cursor: pointer;
            margin-top: 8px;
        }
        .button:hover {
            background-color: #c4b89c;
        }
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .message.success {
            background-color: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .message.error {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="language-picker">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="nl">Nederlands</button>
        </div>

        <div class="header">
            <h1 class="title">House of Beers</h1>
            <p class="subtitle" data-i18n="subtitle">Set new password</p>
        </div>

        <div id="message" class="message hidden"></div>

        <form id="resetForm" class="form">
            <input type="hidden" id="uid" value="{{ uid }}">
            <input type="hidden" id="token" value="{{ token }}">

            <input
                type="password"
                id="password"
                class="input"
                data-i18n-placeholder="passwordPlaceholder"
                placeholder="New password (min 8 characters)"
                required
                minlength="8"
            >

            <input
                type="password"
                id="confirmPassword"
                class="input"
                data-i18n-placeholder="confirmPlaceholder"
                placeholder="Confirm new password"
                required
                minlength="8"
            >

            <button type="submit" id="submitBtn" class="button" data-i18n="resetButton">
                Reset Password
            </button>
        </form>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                subtitle: 'Set new password',
                passwordPlaceholder: 'New password (min 8 characters)',
                confirmPlaceholder: 'Confirm new password',
                resetButton: 'Reset Password',
                resetting: 'Resetting...',
                passwordsNoMatch: 'Passwords do not match',
                passwordTooShort: 'Password must be at least 8 characters',
                invalidLink: 'Invalid reset link',
                invalidLinkFull: 'Invalid password reset link. Please request a new one from the app.',
                success: 'Password has been reset successfully! You can now sign in using the app.',
                error: 'An error occurred. Please try again.',
                failedReset: 'Failed to reset password'
            },
            nl: {
                subtitle: 'Nieuw wachtwoord instellen',
                passwordPlaceholder: 'Nieuw wachtwoord (min 8 tekens)',
                confirmPlaceholder: 'Bevestig nieuw wachtwoord',
                resetButton: 'Wachtwoord resetten',
                resetting: 'Bezig met resetten...',
                passwordsNoMatch: 'Wachtwoorden komen niet overeen',
                passwordTooShort: 'Wachtwoord moet minimaal 8 tekens bevatten',
                invalidLink: 'Ongeldige reset link',
                invalidLinkFull: 'Ongeldige wachtwoord reset link. Vraag een nieuwe aan via de app.',
                success: 'Wachtwoord is succesvol gereset! Je kunt nu inloggen via de app.',
                error: 'Er is een fout opgetreden. Probeer het opnieuw.',
                failedReset: 'Wachtwoord resetten mislukt'
            }
        };

        let currentLang = 'en';

        // Detect browser language
        function detectLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang && browserLang.toLowerCase().startsWith('nl')) {
                return 'nl';
            }
            return 'en';
        }

        // Apply translations
        function applyTranslations(lang) {
            currentLang = lang;
            const t = translations[lang];

            // Update text content
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });

            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) {
                    el.placeholder = t[key];
                }
            });

            // Update language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });

            // Update HTML lang attribute
            document.documentElement.lang = lang;
        }

        // Get translated string
        function t(key) {
            return translations[currentLang][key] || translations['en'][key] || key;
        }

        // Language picker
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                applyTranslations(btn.getAttribute('data-lang'));
            });
        });

        // Form handling
        const form = document.getElementById('resetForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const uid = document.getElementById('uid').value;
            const token = document.getElementById('token').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (password !== confirmPassword) {
                showMessage(t('passwordsNoMatch'), 'error');
                return;
            }

            if (password.length < 8) {
                showMessage(t('passwordTooShort'), 'error');
                return;
            }

            if (!uid || !token) {
                showMessage(t('invalidLink'), 'error');
                return;
            }

            // Submit
            submitBtn.disabled = true;
            submitBtn.textContent = t('resetting');

            try {
                const response = await fetch('/api/auth/password-reset/confirm/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ uid, token, password, password_confirm: password }),
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(t('success'), 'success');
                    form.classList.add('hidden');
                } else {
                    showMessage(data.error || t('failedReset'), 'error');
                }
            } catch (error) {
                showMessage(t('error'), 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = t('resetButton');
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            // Auto-detect language
            applyTranslations(detectLanguage());

            // Check for invalid link
            const uid = document.getElementById('uid').value;
            const token = document.getElementById('token').value;

            if (!uid || !token || uid === 'None' || token === 'None') {
                showMessage(t('invalidLinkFull'), 'error');
                form.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
